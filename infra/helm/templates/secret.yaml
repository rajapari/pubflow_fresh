# Every credential the api/web/worker deployments pull via `secretRef:
# pubflow-secrets` (deployment.yaml). Previously referenced by all three
# Deployments but never created by this chart at all — pods would sit in
# CreateContainerConfigError forever.
#
# `required` fails the `helm upgrade` immediately with a clear message for
# anything the app cannot run without, instead of deploying broken pods —
# same philosophy as apps/api/src/lib/env.ts's requireEnv(). Optional
# third-party integrations (AI, Stripe, Crossref, Lulu, PMC) default to
# empty string, matching how the app code itself gates on their presence
# (aiEnabled(), Sentry's DSN check, etc.) rather than crashing without them.
apiVersion: v1
kind: Secret
metadata:
  name: pubflow-secrets
  namespace: {{ .Values.global.namespace }}
type: Opaque
stringData:
  DATABASE_URL:            {{ required "secrets.databaseUrl is required (managed Postgres connection string)" .Values.secrets.databaseUrl | quote }}
  # Bare password, same credential embedded in DATABASE_URL above — Keycloak
  # needs it as a discrete field (KC_DB_PASSWORD), not a connection string.
  POSTGRES_PASSWORD:        {{ required "secrets.postgresPassword is required — must be the same password embedded in secrets.databaseUrl" .Values.secrets.postgresPassword | quote }}
  REDIS_URL:                {{ required "secrets.redisUrl is required (managed Redis connection string)" .Values.secrets.redisUrl | quote }}
  MINIO_ACCESS_KEY:         {{ required "secrets.minioAccessKey is required (Spaces/S3 access key)" .Values.secrets.minioAccessKey | quote }}
  MINIO_SECRET_KEY:         {{ required "secrets.minioSecretKey is required (Spaces/S3 secret key)" .Values.secrets.minioSecretKey | quote }}
  KEYCLOAK_ADMIN_PASSWORD:  {{ required "secrets.keycloakAdminPassword is required" .Values.secrets.keycloakAdminPassword | quote }}
  ONLYOFFICE_JWT_SECRET:    {{ required "secrets.onlyofficeJwtSecret is required — must match between the api and onlyoffice deployments" .Values.secrets.onlyofficeJwtSecret | quote }}

  # Optional integrations — empty is a valid, supported state (app checks
  # presence at runtime, never crashes on absence).
  ANTHROPIC_API_KEY:        {{ .Values.secrets.anthropicApiKey | default "" | quote }}
  STRIPE_SECRET_KEY:        {{ .Values.secrets.stripeSecretKey | default "" | quote }}
  STRIPE_WEBHOOK_SECRET:    {{ .Values.secrets.stripeWebhookSecret | default "" | quote }}
  CROSSREF_LOGIN_ID:        {{ .Values.secrets.crossrefLoginId | default "" | quote }}
  CROSSREF_LOGIN_PASSWORD:  {{ .Values.secrets.crossrefLoginPassword | default "" | quote }}
  LULU_CLIENT_KEY:          {{ .Values.secrets.luluClientKey | default "" | quote }}
  LULU_CLIENT_SECRET:       {{ .Values.secrets.luluClientSecret | default "" | quote }}
  PMC_FTP_USERNAME:         {{ .Values.secrets.pmcFtpUsername | default "" | quote }}
  PMC_FTP_PASSWORD:         {{ .Values.secrets.pmcFtpPassword | default "" | quote }}
  SENTRY_DSN:                {{ .Values.secrets.sentryDsn | default "" | quote }}
  NEXT_PUBLIC_SENTRY_DSN:    {{ .Values.secrets.sentryDsn | default "" | quote }}
