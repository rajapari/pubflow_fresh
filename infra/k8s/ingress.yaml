apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pubflow-ingress
  namespace: pubflow
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  tls:
    - hosts:
        - app.pubflow.io
        - api.pubflow.io
      secretName: pubflow-tls
  rules:
    - host: app.pubflow.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pubflow-web
                port:
                  number: 80
    - host: api.pubflow.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pubflow-api
                port:
                  number: 80
