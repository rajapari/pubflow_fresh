apiVersion: apps/v1
kind: Deployment
metadata:
  name: pubflow-api
  namespace: pubflow
  labels:
    app: pubflow-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pubflow-api
  template:
    metadata:
      labels:
        app: pubflow-api
    spec:
      containers:
        - name: api
          image: ghcr.io/rajapari84/pubflow/api:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: pubflow-config
            - secretRef:
                name: pubflow-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
