apiVersion: v1
kind: Service
metadata:
  name: pubflow-api
  namespace: pubflow
spec:
  selector:
    app: pubflow-api
  ports:
    - name: http
      port: 80
      targetPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: pubflow-web
  namespace: pubflow
spec:
  selector:
    app: pubflow-web
  ports:
    - name: http
      port: 80
      targetPort: 3000
