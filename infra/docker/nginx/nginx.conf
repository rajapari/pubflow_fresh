events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  client_max_body_size 500M;

  upstream web       { server web:3000; }
  upstream api       { server api:3001; }
  upstream keycloak  { server keycloak:8080; }
  upstream onlyoffice { server onlyoffice:80; }

  server {
    listen 80;
    server_name localhost;

    location /nginx-health { return 200 'ok'; add_header Content-Type text/plain; }

    location /trpc {
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 300s;
    }

    location /health    { proxy_pass http://api; }
    location /webhooks  { proxy_pass http://api; proxy_set_header Host $host; }

    location /onlyoffice/ {
      proxy_pass http://onlyoffice/;
      proxy_set_header Host $host;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
