name: pubflow

# ── Resource profiles ──────────────────────────────────────────────────────
# `pnpm docker:dev` starts only CORE services (no `profiles:` key below) —
# postgres, redis, minio, keycloak, onlyoffice, mailpit, plus the typesetting
# pipeline (pandoc, latex, scribus, preflight). That's everything the main
# submission/review/editing/typesetting/publishing workflow needs end to end.
#
# Two more services groups are opt-in via Compose profiles, because they were
# measured (docker stats, 2026-07-07) to sit at 30-97% CPU each *even at
# idle*, which was stalling the Docker Desktop API on an 8 GB dev machine:
#   `tools`  — languagetool, idml       (copyedit bot / template-porting bot)
#   `design` — penpot ×3                (IDML/InDesign template design tool)
#   `search` — meilisearch              (not wired into the app yet)
# pandoc/latex/scribus/preflight are Flask+gunicorn — near 0% CPU at idle,
# no work until a job hits them — so they stay core despite that split.
# `latex`'s image build is large (texlive-lang-all); the first build after a
# fresh clone takes a while on that one layer.
#
# Start everything:      pnpm docker:dev:full
# Start core + one group: docker compose --env-file .env -f infra/docker/docker-compose.yml --profile tools up -d
networks:
  app:
  data:
  tools:

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
  keycloak_data:
  penpot_data:
  onlyoffice_data:
  onlyoffice_logs:

services:

  # ── DATA ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pubflow_postgres
    environment:
      POSTGRES_USER: pubflow
      # Must match the password embedded in DATABASE_URL (root .env) — they
      # are two views of one credential. Defaulted for local dev; override
      # both together for any non-local deployment.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pubflow_secret}
      POSTGRES_DB: pubflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pubflow -d pubflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [data]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pubflow_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [data]
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: pubflow_minio
    command: server /data --console-address ":9001"
    environment:
      # Reuses the same names the app reads for its own MinIO client (root
      # .env) so container and app credentials can never drift apart.
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-pubflow_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-pubflow_minio_secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks: [data, tools]
    restart: unless-stopped

  # Not wired into apps/api or apps/worker yet — opt-in only (`--profile search`)
  # so it doesn't cost CPU/RAM on every `pnpm docker:dev` before anything uses it.
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: pubflow_meilisearch
    profiles: [search]
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-pubflow_search_key}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    networks: [data]
    restart: unless-stopped

  # ── AUTH ───────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: pubflow_keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/pubflow
      KC_DB_USERNAME: pubflow
      # Same credential as the postgres service above — must stay identical.
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-pubflow_secret}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-Admin@PubFlow2025}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ../../services/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak_data:/opt/keycloak/data
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [app, data]
    restart: unless-stopped

  # ── TYPESETTING PIPELINE ───────────────────────────────
  # The core "Typesetting" pipeline stage (README) — format conversion + PDF
  # composition + the pre-press gate. Genuinely core, not opt-in: every
  # submission that reaches typesetting needs one of pandoc/latex/scribus,
  # and every PDF_PRINT output needs preflight before it can reach
  # PROOF_REVIEW. See the resource-profile note at the top of this file for
  # why these stay in core despite the general resource-conscious split.
  pandoc:
    build:
      context: ../../services/pandoc
    container_name: pubflow_pandoc
    ports:
      - "4000:4000"
    networks: [app]
    restart: unless-stopped

  latex:
    build:
      context: ../../services/latex
    container_name: pubflow_latex
    ports:
      - "5001:5001"
    networks: [app]
    restart: unless-stopped

  scribus:
    build:
      context: ../../services/scribus
      dockerfile: Dockerfile.headless
    container_name: pubflow_scribus
    ports:
      - "5000:5000"
    networks: [app]
    restart: unless-stopped

  preflight:
    build:
      context: ../../services/preflight
    container_name: pubflow_preflight
    ports:
      - "4200:4200"
    networks: [app]
    restart: unless-stopped

  # Artwork QA (Stage 7) — DPI/color-mode/ICC metadata, thumbnails, format
  # conversion. Core for the same reason as the typesetting pipeline above:
  # ARTWORK_PROCESSING is a mandatory stage in the submission workflow, not
  # an opt-in feature. Flask+Pillow, no JVM — idle cost matches pandoc/etc.
  image:
    build:
      context: ../../services/image
    container_name: pubflow_image
    ports:
      - "5002:5002"
    networks: [app]
    restart: unless-stopped

  # ── TOOLS ──────────────────────────────────────────────
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: pubflow_onlyoffice
    environment:
      JWT_ENABLED: "true"
      # No fallback on purpose: this secret MUST match the API's copy or every
      # editor session fails with "security token is not correctly formed".
      # Start the stack via `pnpm docker:dev` (repo root) — it passes the root
      # .env with --env-file so app and container read the same value.
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:?Set ONLYOFFICE_JWT_SECRET — start via `pnpm docker:dev` so the root .env is used}
      # Send the outgoing JWT in a custom header. With the default "Authorization"
      # header, S3/MinIO presigned downloads fail with 400 "request has multiple
      # authentication types" because the URL already carries query-string auth.
      JWT_HEADER: AuthorizationJwt
    # Persists WOPI signing keys, user data, and logs across restarts (the
    # image's own documented paths for this).
    #
    # NOT fixed here: every fresh container also spends several minutes at
    # ~90-100% CPU regenerating font caches — literally `gzip -9` compressing
    # ~200 files one at a time under /var/www/onlyoffice/documentserver/fonts
    # (confirmed via `ps aux` 2026-07-07). That path is the image's own webroot,
    # not a documented data-persistence path; mounting a volume over it (or
    # suppressing OnlyOffice's GENERATE_FONTS step) needs a real test cycle to
    # confirm document conversion still works before trusting it — not done
    # blind. It's a slow, CPU-heavy, one-time-per-restart cost, but it finishes
    # and settles (confirmed via supervisorctl — stable, not crash-looping).
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
    ports:
      - "8081:80"
    networks: [tools, app]
    restart: unless-stopped

  # Only needed by the copyedit style bot (grammar/style suggestions).
  # Measured ~97% CPU sustained even at idle (JVM) — opt-in (`--profile tools`).
  languagetool:
    image: erikvl87/languagetool:latest
    container_name: pubflow_languagetool
    profiles: [tools]
    ports:
      - "8082:8010"
    networks: [tools]
    restart: unless-stopped

  # InDesign IDML layout extractor — feeds the template-porting bot only.
  # Cheap on its own, but grouped with `tools` since it's used by the same
  # niche production-editor workflow, not core submission/review/editing.
  idml:
    build:
      context: ../../services/idml
    container_name: pubflow_idml
    profiles: [tools]
    ports:
      - "4100:4100"
    networks: [tools]
    restart: unless-stopped

  # JATS/EPUB validator — Stage 11 publication gate (epubcheck bundled in
  # the image; local python runs degrade EPUB checks to a warning).
  xmlvalidate:
    build:
      context: ../../services/xmlvalidate
    container_name: pubflow_xmlvalidate
    profiles: [tools]
    ports:
      - "4300:4300"
    networks: [tools]
    restart: unless-stopped

  # Design-tool suite for the IDML/template-porting workflow. Three JVM/BEAM
  # containers; measured 30-50% CPU each sustained even at idle. Opt-in only
  # (`--profile design`) — not needed for core submission/review/editing/publish.
  penpot-frontend:
    image: penpotapp/frontend:latest
    container_name: pubflow_penpot
    profiles: [design]
    environment:
      PENPOT_FLAGS: enable-registration enable-login-with-password
    ports:
      - "3449:80"
    depends_on: [penpot-backend, penpot-exporter]
    networks: [tools]
    restart: unless-stopped

  penpot-backend:
    image: penpotapp/backend:latest
    container_name: pubflow_penpot_backend
    profiles: [design]
    environment:
      PENPOT_FLAGS: enable-registration enable-login-with-password
      # Same credential as the postgres service above — must stay identical.
      PENPOT_DATABASE_URI: postgresql://pubflow:${POSTGRES_PASSWORD:-pubflow_secret}@postgres:5432/pubflow
      PENPOT_DATABASE_USERNAME: pubflow
      PENPOT_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-pubflow_secret}
      PENPOT_REDIS_URI: redis://redis:6379/2
      PENPOT_STORAGE_BACKEND: fs
      PENPOT_STORAGE_FS_DIRECTORY: /opt/data/assets
      PENPOT_TELEMETRY_ENABLED: "false"
      PENPOT_SECRET_KEY: ${PENPOT_SECRET_KEY:-pubflow_penpot_secret}
    volumes:
      - penpot_data:/opt/data/assets
    depends_on: [postgres, redis]
    networks: [tools, data]
    restart: unless-stopped

  penpot-exporter:
    image: penpotapp/exporter:latest
    container_name: pubflow_penpot_exporter
    profiles: [design]
    environment:
      PENPOT_PUBLIC_URI: http://penpot-frontend
      PENPOT_FLAGS: enable-registration enable-login-with-password
    networks: [tools]
    restart: unless-stopped

  # ── DEV UTILITIES ──────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: pubflow_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks: [app]
    restart: unless-stopped
