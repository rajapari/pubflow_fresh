name: pubflow

networks:
  app:
  data:
  tools:

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
  keycloak_data:
  penpot_data:

services:

  # ── DATA ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pubflow_postgres
    environment:
      POSTGRES_USER: pubflow
      POSTGRES_PASSWORD: pubflow_secret
      POSTGRES_DB: pubflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pubflow -d pubflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [data]
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pubflow_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [data]
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: pubflow_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pubflow_minio
      MINIO_ROOT_PASSWORD: pubflow_minio_secret
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks: [data, tools]
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: pubflow_meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-pubflow_search_key}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    networks: [data]
    restart: unless-stopped

  # ── AUTH ───────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: pubflow_keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/pubflow
      KC_DB_USERNAME: pubflow
      KC_DB_PASSWORD: pubflow_secret
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-Admin@PubFlow2025}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ../../services/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak_data:/opt/keycloak/data
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [app, data]
    restart: unless-stopped

  # ── TOOLS ──────────────────────────────────────────────
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: pubflow_onlyoffice
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-pubflow_onlyoffice_secret}
      # Send the outgoing JWT in a custom header. With the default "Authorization"
      # header, S3/MinIO presigned downloads fail with 400 "request has multiple
      # authentication types" because the URL already carries query-string auth.
      JWT_HEADER: AuthorizationJwt
    ports:
      - "8081:80"
    networks: [tools, app]
    restart: unless-stopped

  languagetool:
    image: erikvl87/languagetool:latest
    container_name: pubflow_languagetool
    ports:
      - "8082:8010"
    networks: [tools]
    restart: unless-stopped

  # InDesign IDML layout extractor — feeds the template-porting bot.
  idml:
    build:
      context: ../../services/idml
    container_name: pubflow_idml
    ports:
      - "4100:4100"
    networks: [tools]
    restart: unless-stopped

  penpot-frontend:
    image: penpotapp/frontend:latest
    container_name: pubflow_penpot
    environment:
      PENPOT_FLAGS: enable-registration enable-login-with-password
    ports:
      - "3449:80"
    depends_on: [penpot-backend, penpot-exporter]
    networks: [tools]
    restart: unless-stopped

  penpot-backend:
    image: penpotapp/backend:latest
    container_name: pubflow_penpot_backend
    environment:
      PENPOT_FLAGS: enable-registration enable-login-with-password
      PENPOT_DATABASE_URI: postgresql://pubflow:pubflow_secret@postgres:5432/pubflow
      PENPOT_DATABASE_USERNAME: pubflow
      PENPOT_DATABASE_PASSWORD: pubflow_secret
      PENPOT_REDIS_URI: redis://redis:6379/2
      PENPOT_STORAGE_BACKEND: fs
      PENPOT_STORAGE_FS_DIRECTORY: /opt/data/assets
      PENPOT_TELEMETRY_ENABLED: "false"
      PENPOT_SECRET_KEY: ${PENPOT_SECRET_KEY:-pubflow_penpot_secret}
    volumes:
      - penpot_data:/opt/data/assets
    depends_on: [postgres, redis]
    networks: [tools, data]
    restart: unless-stopped

  penpot-exporter:
    image: penpotapp/exporter:latest
    container_name: pubflow_penpot_exporter
    environment:
      PENPOT_PUBLIC_URI: http://penpot-frontend
      PENPOT_FLAGS: enable-registration enable-login-with-password
    networks: [tools]
    restart: unless-stopped

  # ── DEV UTILITIES ──────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: pubflow_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks: [app]
    restart: unless-stopped
