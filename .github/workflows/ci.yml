name: PubFlow CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  check:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pubflow/db db:generate
      - run: pnpm lint

  test:
    name: Test Suites
    runs-on: ubuntu-latest
    # Real env vars (not just the .env file written below) — `prisma migrate
    # deploy` runs from packages/db and Prisma's own .env auto-load is
    # directory-relative, so it never sees the root .env this job writes.
    # Must match the values in that .env file exactly.
    env:
      DATABASE_URL: postgresql://pubflow:pubflow_secret@127.0.0.1:5432/pubflow
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pubflow/db db:generate

      # CI-only .env: same defaults documented in .env.example, no real
      # secrets involved — these values never leave the ephemeral runner.
      # Must match the docker-compose service credentials below exactly
      # (same drift risk this project already hit once with OnlyOffice/Postgres).
      - name: Write CI .env
        run: |
          cat > .env <<'EOF'
          POSTGRES_PASSWORD=pubflow_secret
          DATABASE_URL=postgresql://pubflow:pubflow_secret@127.0.0.1:5432/pubflow
          REDIS_URL=redis://127.0.0.1:6379/0
          MINIO_ENDPOINT=127.0.0.1
          MINIO_PORT=9000
          MINIO_USE_SSL=false
          MINIO_BUCKET=pubflow-files
          MINIO_ACCESS_KEY=pubflow_minio
          MINIO_SECRET_KEY=pubflow_minio_secret
          LANGUAGETOOL_URL=http://127.0.0.1:8082
          ANTHROPIC_API_KEY=
          APP_URL=http://localhost:3000
          API_URL=http://localhost:3001
          ONLYOFFICE_JWT_SECRET=ci_only_placeholder_secret
          EOF

      # Reuses the same docker-compose.yml the app runs on locally — one
      # source of truth for service images/ports, not a second definition
      # that could silently drift from what dev/prod actually use.
      # idml and image are needed too: apps/worker/test/template.test.ts and
      # apps/worker/test/image.test.ts hit the real extractor/QA services,
      # not mocks.
      - name: Start data services (postgres, redis, minio, languagetool, idml, image)
        run: |
          docker compose --env-file .env -f infra/docker/docker-compose.yml \
            --profile tools up -d postgres redis minio languagetool idml image
          docker compose --env-file .env -f infra/docker/docker-compose.yml \
            up -d --wait postgres redis minio

      - name: Wait for MinIO
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:9000/minio/health/live && exit 0
            sleep 2
          done
          echo "MinIO never became healthy" && exit 1

      # idml/image have no compose healthcheck (same as minio above), and
      # they build from source rather than pulling a pre-built image, so
      # they need their own explicit readiness wait rather than `--wait`.
      - name: Wait for IDML extractor
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4100/health && exit 0
            sleep 2
          done
          echo "IDML extractor never became healthy" && exit 1

      - name: Wait for image QA service
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:5002/health && exit 0
            sleep 2
          done
          echo "Image QA service never became healthy" && exit 1

      - run: pnpm --filter @pubflow/db db:migrate

      # Must run before `pnpm test`: apps/worker/test/template.test.ts shells
      # out to services/idml/test_server.py for its live-IDML-extractor test,
      # and that file does `import pytest` at module level — so the import
      # fails without pytest installed, even though pytest itself doesn't
      # run until the separate step below.
      - name: Install Python test dependencies
        run: pip install flask lxml pikepdf Pillow pytest

      - run: pnpm test

      - name: Python service tests (no live server needed — Flask test client)
        # Run separately: files share a test_server.py basename, so collecting
        # them in one pytest invocation is a module-name collision.
        run: |
          python -m pytest services/idml/test_server.py -q
          python -m pytest services/latex/test_server.py -q
          python -m pytest services/preflight/test_server.py -q
          python -m pytest services/image/test_server.py -q

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [check, test]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pubflow/db db:generate

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pubflow/api:latest
            ghcr.io/${{ github.repository_owner }}/pubflow/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # NEXT_PUBLIC_* vars are inlined into the client bundle at build time
      # (see apps/web/Dockerfile's ARG block) — they MUST be passed here, not
      # left to the Helm ConfigMap, or the deployed browser bundle silently
      # ships with them undefined (auth would break). Sourced from repo
      # Variables (Settings → Secrets and variables → Actions → Variables)
      # since these are meant to be public in the browser bundle, not repo
      # Secrets — with fallbacks matching infra/helm/values.yaml's defaults
      # so a fresh repo without any configured vars still produces a
      # deployable (if placeholder-hostnamed) image.
      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pubflow/web:latest
            ghcr.io/${{ github.repository_owner }}/pubflow/web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://api.pubflow.io' }}
            NEXT_PUBLIC_KEYCLOAK_URL=${{ vars.NEXT_PUBLIC_KEYCLOAK_URL || 'https://auth.pubflow.io' }}
            NEXT_PUBLIC_KEYCLOAK_REALM=${{ vars.NEXT_PUBLIC_KEYCLOAK_REALM || 'pubflow' }}
            NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=${{ vars.NEXT_PUBLIC_KEYCLOAK_CLIENT_ID || 'pubflow-web' }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            NEXT_PUBLIC_SENTRY_ENVIRONMENT=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pubflow/worker:latest
            ghcr.io/${{ github.repository_owner }}/pubflow/worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # No cluster wired up yet — skip cleanly instead of failing red so CI
      # signal stays meaningful. Add the KUBECONFIG repo secret to enable.
      # `secrets` isn't usable directly in step `if:` expressions, so route
      # it through env: (always supported) into a step output instead.
      - name: Check for KUBECONFIG secret
        id: check-kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          if [ -n "$KUBECONFIG_DATA" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up kubectl
        if: steps.check-kubeconfig.outputs.present == 'true'
        uses: azure/setup-kubectl@v4

      # Non-secret infra facts (managed Postgres hostname, Spaces endpoint,
      # ingress hostnames) live directly in infra/helm/values.yaml — edit
      # and commit that file once you know your real values, same as any
      # other config. Only actual credentials are injected here, from repo
      # Secrets, and never committed. --set-string avoids Helm's type
      # coercion on password-like strings; a literal comma inside a secret
      # value would still break Helm's --set parsing (rare in practice for
      # generated passwords/connection strings, but worth knowing).
      - name: Deploy via Helm
        if: steps.check-kubeconfig.outputs.present == 'true'
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          echo "$KUBECONFIG_DATA" > /tmp/kubeconfig.yaml
          export KUBECONFIG=/tmp/kubeconfig.yaml
          helm upgrade --install pubflow infra/helm \
            --namespace pubflow \
            --create-namespace \
            --set global.imageTag=${{ github.sha }} \
            --set global.imageRegistry=ghcr.io/${{ github.repository_owner }}/pubflow \
            --set-string secrets.databaseUrl="${{ secrets.PROD_DATABASE_URL }}" \
            --set-string secrets.postgresPassword="${{ secrets.PROD_POSTGRES_PASSWORD }}" \
            --set-string secrets.redisUrl="${{ secrets.PROD_REDIS_URL }}" \
            --set-string secrets.minioAccessKey="${{ secrets.PROD_MINIO_ACCESS_KEY }}" \
            --set-string secrets.minioSecretKey="${{ secrets.PROD_MINIO_SECRET_KEY }}" \
            --set-string secrets.keycloakAdminPassword="${{ secrets.PROD_KEYCLOAK_ADMIN_PASSWORD }}" \
            --set-string secrets.onlyofficeJwtSecret="${{ secrets.PROD_ONLYOFFICE_JWT_SECRET }}" \
            --set-string secrets.anthropicApiKey="${{ secrets.ANTHROPIC_API_KEY }}" \
            --set-string secrets.stripeSecretKey="${{ secrets.STRIPE_SECRET_KEY }}" \
            --set-string secrets.stripeWebhookSecret="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            --set-string secrets.crossrefLoginId="${{ secrets.CROSSREF_LOGIN_ID }}" \
            --set-string secrets.crossrefLoginPassword="${{ secrets.CROSSREF_LOGIN_PASSWORD }}" \
            --set-string secrets.luluClientKey="${{ secrets.LULU_CLIENT_KEY }}" \
            --set-string secrets.luluClientSecret="${{ secrets.LULU_CLIENT_SECRET }}" \
            --set-string secrets.pmcFtpUsername="${{ secrets.PMC_FTP_USERNAME }}" \
            --set-string secrets.pmcFtpPassword="${{ secrets.PMC_FTP_PASSWORD }}" \
            --set-string secrets.sentryDsn="${{ secrets.SENTRY_DSN }}" \
            --wait \
            --timeout 5m
          kubectl rollout status deployment/pubflow-api   -n pubflow
          kubectl rollout status deployment/pubflow-web   -n pubflow
          kubectl rollout status deployment/pubflow-worker -n pubflow
          kubectl rollout status deployment/pubflow-keycloak   -n pubflow
          kubectl rollout status deployment/pubflow-onlyoffice -n pubflow
