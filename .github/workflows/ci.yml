name: PubFlow CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  check:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pubflow/db db:generate
      - run: pnpm lint

  test:
    name: Test Suites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pubflow/db db:generate

      # CI-only .env: same defaults documented in .env.example, no real
      # secrets involved — these values never leave the ephemeral runner.
      # Must match the docker-compose service credentials below exactly
      # (same drift risk this project already hit once with OnlyOffice/Postgres).
      - name: Write CI .env
        run: |
          cat > .env <<'EOF'
          POSTGRES_PASSWORD=pubflow_secret
          DATABASE_URL=postgresql://pubflow:pubflow_secret@127.0.0.1:5432/pubflow
          REDIS_URL=redis://127.0.0.1:6379/0
          MINIO_ENDPOINT=127.0.0.1
          MINIO_PORT=9000
          MINIO_USE_SSL=false
          MINIO_BUCKET=pubflow-files
          MINIO_ACCESS_KEY=pubflow_minio
          MINIO_SECRET_KEY=pubflow_minio_secret
          LANGUAGETOOL_URL=http://127.0.0.1:8082
          ANTHROPIC_API_KEY=
          APP_URL=http://localhost:3000
          API_URL=http://localhost:3001
          EOF

      # Reuses the same docker-compose.yml the app runs on locally — one
      # source of truth for service images/ports, not a second definition
      # that could silently drift from what dev/prod actually use.
      - name: Start data services (postgres, redis, minio, languagetool)
        run: |
          docker compose --env-file .env -f infra/docker/docker-compose.yml \
            --profile tools up -d postgres redis minio languagetool
          docker compose --env-file .env -f infra/docker/docker-compose.yml \
            up -d --wait postgres redis minio

      - name: Wait for MinIO
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:9000/minio/health/live && exit 0
            sleep 2
          done
          echo "MinIO never became healthy" && exit 1

      - run: pnpm --filter @pubflow/db db:migrate
      - run: pnpm test

      - name: Python service tests (no live server needed — Flask test client)
        # Run separately: files share a test_server.py basename, so collecting
        # them in one pytest invocation is a module-name collision.
        run: |
          pip install flask lxml pikepdf pytest
          python -m pytest services/idml/test_server.py -q
          python -m pytest services/latex/test_server.py -q
          python -m pytest services/preflight/test_server.py -q

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: [check, test]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pubflow/db db:generate

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pubflow/api:latest
            ghcr.io/${{ github.repository_owner }}/pubflow/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pubflow/web:latest
            ghcr.io/${{ github.repository_owner }}/pubflow/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pubflow/worker:latest
            ghcr.io/${{ github.repository_owner }}/pubflow/worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy via Helm
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          echo "$KUBECONFIG_DATA" > /tmp/kubeconfig.yaml
          export KUBECONFIG=/tmp/kubeconfig.yaml
          helm upgrade --install pubflow infra/helm \
            --namespace pubflow \
            --create-namespace \
            --set global.imageTag=${{ github.sha }} \
            --set global.imageRegistry=ghcr.io/${{ github.repository_owner }}/pubflow \
            --wait \
            --timeout 5m
          kubectl rollout status deployment/pubflow-api   -n pubflow
          kubectl rollout status deployment/pubflow-web   -n pubflow
          kubectl rollout status deployment/pubflow-worker -n pubflow
